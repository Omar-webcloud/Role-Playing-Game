<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>RPG - Dragon Repeller</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
</head>
<body>
    <header>
        <h1 class="game-title">🐉 Dragon Repeller</h1>
        <div id="auth-status">
            <span id="user-display"></span>
            <button id="logout-button" style="display: none;">Logout</button>
        </div>
    </header>

    <!-- Authentication Modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="auth-tabs">
                <button class="auth-tab-btn active" data-tab="login">Login</button>
                <button class="auth-tab-btn" data-tab="signup">Sign Up</button>
            </div>
            
            <div id="login-tab" class="auth-tab-content">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email:</label>
                        <input type="email" id="login-email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password:</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="auth-button">Login</button>
                </form>
                <p id="login-error" class="error-message"></p>
            </div>
            
            <div id="signup-tab" class="auth-tab-content" style="display: none;">
                <h2>Sign Up</h2>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-email">Email:</label>
                        <input type="email" id="signup-email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password:</label>
                        <input type="password" id="signup-password" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password:</label>
                        <input type="password" id="signup-confirm" required>
                    </div>
                    <button type="submit" class="auth-button">Sign Up</button>
                </form>
                <p id="signup-error" class="error-message"></p>
            </div>
        </div>
    </div>

    <div id="game" style="display: none;">
        <div id="stats">
            <div class="stat-group">
                <div class="stat-badge">
                    <span class="stat-label">Level</span>
                    <strong id="levelText">1</strong>
                </div>
                <div class="stat-badge">
                    <span class="stat-label">XP</span>
                    <strong id="xpText">0</strong>
                </div>
                <div class="stat-badge gold">
                    <span class="stat-label">Gold</span>
                    <strong id="goldText">50</strong>
                </div>
            </div>
            <div class="stat-bars">
                <div class="bar-row">
                    <span class="bar-label">HP</span>
                    <div class="bar-track">
                        <div id="healthBar" class="bar-fill health-fill"></div>
                    </div>
                    <span id="healthText" class="bar-value">100 / 100</span>
                </div>
                <div class="bar-row">
                    <span class="bar-label">XP</span>
                    <div class="bar-track">
                        <div id="xpBar" class="bar-fill xp-fill"></div>
                    </div>
                    <span id="xpProgressText" class="bar-value">0 / 10</span>
                </div>
            </div>
            <div class="weapon-row">
                <span class="weapon-label">Equipped</span>
                <strong id="weaponText">stick</strong>
            </div>
            <button id="save-button" class="save-btn">Save Game</button>
        </div>

        <div id="location-badge">
            <span id="locationName">Town Square</span>
        </div>

        <div id="monsterStats">
            <div class="monster-header">
                <span id="monsterName"></span>
                <span id="monsterLevel" class="monster-level"></span>
            </div>
            <div class="bar-row monster-bar">
                <div class="bar-track">
                    <div id="monsterHealthBar" class="bar-fill monster-fill"></div>
                </div>
                <span id="monsterHealth" class="bar-value"></span>
            </div>
        </div>

        <div id="text">
            Welcome to Dragon Repeller. You must defeat the dragon that is preventing people from leaving the town. You are in the town square. Where do you want to go?
        </div>

        <div id="combat-log" aria-live="polite"></div>

        <div id="controls">
            <button id="button1" class="action-btn">Go to store</button>
            <button id="button2" class="action-btn">Go to cave</button>
            <button id="button3" class="action-btn">Fight dragon</button>
        </div>
    </div>

    <!-- Firebase Config and Auth -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
