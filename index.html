<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1020">
    <meta
        name="description"
        content="Dragon Repeller is a vintage-inspired pixel RPG with quests, combat, and classic adventure."
    >
    <link rel="stylesheet" href="styles.css">

    <title>Dragon Repeller</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/pixi.js@7.4.2/dist/pixi.min.js"></script>
</head>
<body>
    <header>
        <div class="brand-mark" aria-hidden="true">DR</div>
        <div class="hero-copy">
            <h1 class="game-title">Dragon Repeller</h1>
            <p class="game-subtitle">A vintage pixel adventure with quests, loot, and danger.</p>
        </div>
        <div id="auth-status">
            <span id="user-display"></span>
            <button id="logout-button" type="button" style="display: none;">Logout</button>
        </div>
    </header>

    <!-- Authentication Modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <span class="close" aria-label="Close authentication dialog">&times;</span>
            <div class="auth-tabs">
                <button class="auth-tab-btn active" data-tab="login" type="button">Login</button>
                <button class="auth-tab-btn" data-tab="signup" type="button">Sign Up</button>
            </div>

            <div id="login-tab" class="auth-tab-content">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="auth-button">Login</button>
                </form>
                <p id="login-error" class="error-message"></p>
            </div>

            <div id="signup-tab" class="auth-tab-content" style="display: none;">
                <h2>Sign Up</h2>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" autocomplete="new-password" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" autocomplete="new-password" required>
                    </div>
                    <button type="submit" class="auth-button">Create Account</button>
                </form>
                <p id="signup-error" class="error-message"></p>
            </div>
        </div>
    </div>

    <div id="game" style="display:none;">
        <div id="stats">
            <div class="stat-grid">
                <div class="stat-card">
                    <span>Level</span>
                    <strong id="levelText">1</strong>
                </div>

                <div class="stat-card">
                    <span>XP</span>
                    <strong id="xpText">0</strong>
                </div>

                <div class="stat-card gold">
                    <span>Gold</span>
                    <strong id="goldText">50</strong>
                </div>

                <div class="stat-card">
                    <span>Defense</span>
                    <strong id="defenseText">0</strong>
                </div>
            </div>

            <div class="bars">
                <div class="bar-row">
                    <span>HP</span>
                    <div class="bar-track">
                        <div id="healthBar" class="bar-fill health-fill"></div>
                    </div>
                    <strong id="healthText">100 / 100</strong>
                </div>

                <div class="bar-row">
                    <span>XP</span>
                    <div class="bar-track">
                        <div id="xpBar" class="bar-fill xp-fill"></div>
                    </div>
                    <strong id="xpProgressText">0 / 10</strong>
                </div>
            </div>

            <div class="equipment-panel">
                <div>
                    Weapon:
                    <strong id="weaponText">Stick</strong>
                </div>

                <div>
                    Armor:
                    <strong id="armorText">Cloth</strong>
                </div>
            </div>

            <button id="save-button" class="save-btn" type="button">
                💾 Save Game
            </button>
        </div>

        <div id="location-badge">
            <span id="locationName">Town Square</span>
        </div>

        <div id="scene-wrapper">
            <canvas
                id="sceneCanvas"
                width="640"
                height="320">
            </canvas>
        </div>

        <div id="monsterStats" aria-live="polite">
            <div class="monster-header">
                <span id="monsterName"></span>
                <span id="monsterLevel"></span>
            </div>

            <div class="bar-row">
                <div class="bar-track">
                    <div
                        id="monsterHealthBar"
                        class="bar-fill monster-fill">
                    </div>
                </div>
                <strong id="monsterHealth"></strong>
            </div>
        </div>

        <div id="controls">
            <button id="button1" class="action-btn" type="button"></button>
            <button id="button2" class="action-btn" type="button"></button>
            <button id="button3" class="action-btn" type="button"></button>
        </div>

        <div id="main-layout">
            <div id="left-panel">
                <div id="text" aria-live="polite"></div>
                <div id="combat-log" aria-live="polite" aria-atomic="false"></div>
            </div>

            <div id="right-panel">
                <div class="panel">
                    <h3><span class="panel-icon" aria-hidden="true">🎒</span> Inventory</h3>
                    <div id="inventoryList"></div>
                </div>

                <div class="panel">
                    <h3><span class="panel-icon" aria-hidden="true">🛡️</span> Equipment</h3>
                    <div id="equipmentList"></div>
                </div>

                <div class="panel">
                    <h3><span class="panel-icon" aria-hidden="true">📜</span> Quest Log</h3>
                    <div id="questList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Config and Auth -->
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
